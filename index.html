<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>從 606 出發！給孩子的一份畢業禮物：受用一生的自律能力</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f97316' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4v-4H4v4H0v2h4v4h2v-4h4v-2H6zm30 0v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .card-soft {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="bg-[#FFFDF9] bg-pattern text-slate-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                setTimeout(() => lucide.createIcons(), 100);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [isMenuOpen, scrolled]);

            const habits = [
                { title: "調整好規律作息 ⏰", desc: "協助孩子維持早睡早起，並練習在規定時間內專心完成作業，遠離手機誘惑，建立良好的學習節奏。" },
                { title: "聯絡簿簽名與檢查 📖", desc: "請家長每日撥冗簽名並落實檢查，確認孩子清楚各項測驗與作業進度，培養「今日事今日畢」的責任感。" },
                { title: "自己的小幫手 🎒", desc: "練習自己整理書包、對課表。當孩子學會對文具與學用品負責，就是在練習對自己的人生負責。" },
                { title: "數位生活的小約定 📱", desc: "與孩子商量手機的使用時間與規範，現在建立好良性溝通，進入國中後能減少許多不必要的爭執。" },
                { title: "把心事說出來 💬", desc: "鼓勵孩子有困難就主動找父母或老師商量。練習正向表達想法，讓我們成為孩子迎接青春期最堅強的後盾。" }
            ];

            const schedule = [
                { date: '4/22 - 4/23', event: '期中挑戰日', type: 'exam', color: 'from-orange-200 to-orange-300', icon: 'award' },
                { date: '4/30', event: '期中班遊趣', type: 'trip', color: 'from-yellow-200 to-yellow-300', icon: 'map' },
                { date: '6/2 - 6/3', event: '最後的測驗', type: 'exam', color: 'from-orange-200 to-orange-300', icon: 'award' },
                { date: '6/5', event: '期末小旅行', type: 'trip', color: 'from-yellow-200 to-yellow-300', icon: 'map' },
                { date: '6/11', event: '畢業大盛事', type: 'special', color: 'from-pink-200 to-pink-300', icon: 'star' },
            ];

            const expenses = [
                { item: '國語生字甲乙本', cost: 65 },
                { item: '國語練習', cost: 50 },
                { item: '數學作業及考卷', cost: 100 },
                { item: '自然作業及考卷', cost: 110 },
                { item: '社會作業及考卷', cost: 100 },
                { item: '創意美勞材料', cost: 22 },
                { item: '練習作文簿', cost: 10 },
                { item: '講義影印費', cost: 100 },
                { item: '班級雜項支出', cost: 43 },
            ];

            const NavItem = ({ href, children, iconName }) => (
                <a 
                    href={href} 
                    className="flex items-center gap-2 px-4 py-2 text-slate-600 font-medium hover:text-orange-500 transition-all"
                    onClick={() => setIsMenuOpen(false)}
                >
                    <i data-lucide={iconName} className="w-4 h-4"></i>
                    <span>{children}</span>
                </a>
            );

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed top-0 w-full transition-all duration-500 z-50 ${scrolled ? 'bg-white/80 backdrop-blur-md shadow-sm py-2' : 'bg-transparent py-4'}`}>
                        <div className="max-w-6xl mx-auto px-6 flex items-center justify-between">
                            <div className="flex items-center gap-2 font-black text-2xl text-orange-500">
                                <i data-lucide="coffee" className="p-1"></i>
                                <span>大雅 606</span>
                            </div>
                            <div className="hidden md:flex items-center gap-2">
                                <NavItem href="#habits" iconName="sparkles">銜接錦囊</NavItem>
                                <NavItem href="#calendar" iconName="calendar">行事曆</NavItem>
                                <NavItem href="#finance" iconName="dollar-sign">班費</NavItem>
                            </div>
                            <button className="md:hidden text-orange-500" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i data-lucide={isMenuOpen ? "x" : "menu"}></i>
                            </button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="pt-36 pb-16 px-6 text-center">
                        <div className="max-w-4xl mx-auto">
                            <span className="bg-orange-50 text-orange-500 px-4 py-1.5 rounded-full text-sm font-bold tracking-wide">給親愛的 606 爸媽們</span>
                            <h1 className="text-3xl md:text-5xl font-black mt-6 mb-6 text-slate-800 leading-snug">
                                從 606 出發！<br />
                                <span className="text-orange-500">
                                    給孩子的一份畢業禮物：<br />受用一生的自律能力
                                </span>
                            </h1>
                            <p className="text-lg text-slate-500 leading-relaxed max-w-xl mx-auto font-medium">
                                國小的最後一哩路，讓我們手牽手，陪孩子一起暖身，準備好迎接精彩的新生活吧！
                            </p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 space-y-24 pb-20">
                        
                        {/* 銜接錦囊區塊 */}
                        <section id="habits" className="scroll-mt-32">
                            <div className="text-center mb-10">
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-2">重點錦囊：銜接國中黃金期</h2>
                                <p className="text-slate-400">讓我們在最後一學期，共同落實以下核心習慣</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {habits.map((h, i) => (
                                    <div key={i} className="card-soft p-8 rounded-[2rem] shadow-sm hover:shadow-md hover:bg-white transition-all duration-300">
                                        <h3 className="text-lg font-bold text-orange-500 mb-3">{h.title}</h3>
                                        <p className="text-slate-500 leading-relaxed text-sm">{h.desc}</p>
                                    </div>
                                ))}
                                <div className="md:col-span-2 lg:col-span-1 bg-orange-500 p-8 rounded-[2rem] text-white flex flex-col justify-center">
                                    <i data-lucide="shield-check" className="w-8 h-8 mb-4"></i>
                                    <h3 className="text-xl font-bold mb-2">親師合作叮嚀</h3>
                                    <p className="opacity-90 text-sm leading-relaxed">
                                        透過家長的陪伴檢查與習慣養成，我們能讓孩子更自信、穩健地踏入國中校門！
                                    </p>
                                </div>
                            </div>
                        </section>

                        {/* 行事曆 */}
                        <section id="calendar" className="scroll-mt-32">
                            <h2 className="text-2xl font-black mb-8 flex items-center gap-3">
                                <i data-lucide="calendar" className="text-orange-400"></i> 六下重要日子
                            </h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                                {schedule.map((s, i) => (
                                    <div key={i} className="bg-white p-6 rounded-3xl border border-slate-100 hover:border-orange-100 transition-all text-center">
                                        <div className={`w-12 h-12 mx-auto rounded-full bg-gradient-to-br ${s.color} flex items-center justify-center text-slate-600 mb-4`}>
                                            <i data-lucide={s.icon} className="w-5 h-5"></i>
                                        </div>
                                        <div className="text-[10px] font-bold text-orange-400 tracking-wider mb-1 uppercase">{s.date}</div>
                                        <div className="font-bold text-slate-700">{s.event}</div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 班費 */}
                        <section id="finance" className="scroll-mt-32">
                            <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-8 border-b bg-slate-50/50 flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div>
                                        <h2 className="text-2xl font-black flex items-center gap-2">
                                            <i data-lucide="info" className="text-emerald-500"></i> 班費支用概算
                                        </h2>
                                        <p className="text-slate-400 text-sm">公開透明，為了給孩子更好的學習環境</p>
                                    </div>
                                    <div className="bg-emerald-50 text-emerald-600 px-6 py-2 rounded-xl text-xl font-black">
                                        本期合計 NT$ 600
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50/30 text-slate-400 text-xs font-bold uppercase tracking-widest">
                                            <tr>
                                                <th className="px-8 py-4">項目內容</th>
                                                <th className="px-8 py-4 text-right">費用</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {expenses.map((e, i) => (
                                                <tr key={i} className="group">
                                                    <td className="px-8 py-3 text-slate-600 font-medium group-hover:text-orange-400 transition-colors">{e.item}</td>
                                                    <td className="px-8 py-3 text-right font-bold text-slate-400">{e.cost}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="py-12 px-6 text-center border-t border-slate-100">
                        <div className="max-w-xl mx-auto">
                            <p className="text-orange-500 font-bold mb-2 tracking-widest">大雅國小 606</p>
                            <p className="text-slate-400 text-sm">讓我們陪著孩子，從 606 快樂啟航！</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
